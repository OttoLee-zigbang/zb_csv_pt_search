<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직방 서비스 지정점 찾기</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        /* [수정 1] 제품군 미선택 시 작동할 좌우 흔들림(Shake) 애니메이션 효과 정의 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake-effect {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center py-10 px-4">

    <div id="mainCard" class="max-w-md w-full bg-white shadow-lg rounded-2xl p-6 border border-gray-100 transition-transform">
        
        <div class="flex items-center justify-center gap-3 mb-6">
            <img src="./Zigbang_Symbol_Profile.png" alt="직방 로고" class="h-10 w-auto object-contain shrink-0">
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">직방 서비스 지정점 찾기</h1>
        </div>
        
        <div id="connectionStatus" class="text-center text-xs font-semibold mb-4 p-2 bg-yellow-50 text-yellow-700 rounded-lg animate-pulse">
            직방 서비스 지정점 DB 불러오는 중...
        </div>
        
        <div class="mb-5">
            <div class="flex justify-between items-center mb-2">
                <label class="block text-base font-bold text-gray-800">제품군 선택</label>
                <span id="categoryAlert" class="text-xs font-semibold text-red-500 hidden">제품군을 선택하세요</span>
            </div>
            <select id="categorySelect" onchange="hideAlert()" class="w-full border border-gray-300 rounded-lg p-3 bg-white focus:outline-none focus:ring-2 focus:ring-orange-500">
                <option value="선택" selected>선택</option>
                <option value="도어락">도어락</option>
                <option value="홈네트워크">홈네트워크</option>
            </select>
        </div>

        <div class="mb-5">
            <label class="block text-base font-bold text-gray-800 mb-2">주소 검색</label>
            <div class="flex gap-2 mb-2">
                <input type="text" id="postcode" placeholder="우편번호" readonly class="w-1/3 border border-gray-300 rounded-lg p-3 bg-gray-50 text-center focus:outline-none">
                <button type="button" onclick="openAddrSearch()" class="w-2/3 font-medium rounded-lg p-3 hover:brightness-90 transition cursor-pointer" style="background-color: #808080; color: #FFFFFF;">
                    주소 찾기 🔍
                </button>
            </div>
            <input type="text" id="address" placeholder="선택된 주소가 표시됩니다." readonly class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:outline-none">
        </div>

        <button type="button" onclick="searchBranch()" class="w-full text-white font-bold rounded-lg p-4 transition mb-6 shadow-md hover:brightness-95 cursor-pointer" style="background-color: #ff681b;">
            지정점 찾기 🚀
        </button>

        <hr class="border-gray-200 mb-6">

        <div>
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-base font-bold text-gray-800">지정점 검색 결과</h2>
                <button type="button" onclick="resetForm()" class="text-xs font-medium px-3 py-1 rounded-md hover:brightness-90 transition cursor-pointer" style="background-color: #808080; color: #FFFFFF;">
                    초기화
                </button>
            </div>
            <div id="resultArea">
                <p class="text-gray-400 text-center py-6 text-sm">제품군을 선택하고 주소를 검색해주세요.</p>
            </div>
        </div>
    </div>

    <script>
        const googleSheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNQCQJ6a31n8CaHsbys-hZTkrPPWr36q5txpGP9UjZsxG-0XbyRLf7qhAKx7fme3KAlG9LTejSpiI_/pub?gid=0&single=true&output=csv&nocache=" + new Date().getTime();

        let branchDatabase = []; 

        window.onload = function() {
            fetch(googleSheetCsvUrl)
                .then(response => {
                    if (!response.ok) throw new Error('네트워크 응답 없음');
                    return response.text();
                })
                .then(csvText => {
                    parseCSV(csvText); 
                    document.getElementById('connectionStatus').innerText = "✅ 직방 서비스 지정점 DB 연동 완료!";
                    document.getElementById('connectionStatus').className = "text-center text-xs font-semibold mb-4 p-2 bg-green-50 text-green-700 rounded-lg";
                })
                .catch(error => {
                    console.error("로드 오류 내역:", error);
                    document.getElementById('connectionStatus').innerText = "❌ 데이터 연동 실패 (네트워크 상태를 확인해 주세요)";
                    document.getElementById('connectionStatus').className = "text-center text-xs font-semibold mb-4 p-2 bg-red-50 text-red-700 rounded-lg";
                });
        };

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const columns = lines[i].split(",");
                
                if(columns.length >= 3) {
                    branchDatabase.push({
                        category: columns[0]?.replace(/"/g, "").trim(),
                        name: columns[1]?.replace(/"/g, "").trim(),
                        postcode: columns[2]?.replace(/"/g, "").trim(),
                        phone: columns[3]?.replace(/"/g, "").trim() || "연락처 없음"
                    });
                }
            }
        }

        function openAddrSearch() {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('postcode').value = data.zonecode; 
                    document.getElementById('address').value = data.roadAddress || data.address; 
                }
            }).open();
        }

        // [수정 1] 사용자가 드롭박스를 올바르게 바꾸면 빨간 경고 문구를 자동으로 지워주는 함수
        function hideAlert() {
            const category = document.getElementById('categorySelect').value;
            if (category !== "선택") {
                document.getElementById('categoryAlert').classList.add('hidden');
            }
        }

        // [수정 2] 시스템 전체 입력 요소 및 결과창을 초기 상태로 돌려놓는 함수
        function resetForm() {
            document.getElementById('categorySelect').value = "선택";
            document.getElementById('postcode').value = "";
            document.getElementById('address').value = "";
            document.getElementById('categoryAlert').classList.add('hidden');
            document.getElementById('resultArea').innerHTML = `
                <p class="text-gray-400 text-center py-6 text-sm">제품군을 선택하고 주소를 검색해주세요.</p>
            `;
        }

        function searchBranch() {
            const category = document.getElementById('categorySelect').value;
            const postcode = document.getElementById('postcode').value; 
            const resultArea = document.getElementById('resultArea');
            const mainCard = document.getElementById('mainCard');
            const categoryAlert = document.getElementById('categoryAlert');

            // [수정 1] 제품군 선택이 "선택" 상태일 때 흔들림 효과 및 경고 문구 출력 작동
            if (category === "선택") {
                categoryAlert.classList.remove('hidden'); // 빨간 안내 노출
                
                // 흔들림 클래스 추가 (기존에 있었다면 지웠다 다시 붙여 애니메이션 연속 발동)
                mainCard.classList.remove('shake-effect');
                void mainCard.offsetWidth; // 브라우저가 애니메이션 리셋을 인지하도록 하는 장치
                mainCard.add('shake-effect');
                mainCard.classList.add('shake-effect');
                return;
            }

            if (!postcode) {
                alert("먼저 '주소 찾기' 버튼을 눌러 주소를 선택해주세요!");
                return;
            }

            const matchedBranches = branchDatabase.filter(branch => {
                if (!branch.postcode) return false;
                
                let cleanBranchPostcode = branch.postcode.padStart(5, '0');
                let cleanInputPostcode = postcode.padStart(5, '0');
                
                return branch.category === category && cleanBranchPostcode === cleanInputPostcode;
            });

            if (matchedBranches.length > 0) {
                let htmlContent = '';
                matchedBranches.forEach(branch => {
                    htmlContent += `
                        <div class="p-4 mb-3 border border-orange-100 bg-orange-50/30 rounded-xl">
                            <div class="font-bold text-gray-900 text-base mb-1">${branch.name}</div>
                            <div class="text-sm text-gray-500 mb-2">${category} 서비스 지정점</div>
                            <a href="tel:${branch.phone}" class="inline-flex items-center text-sm font-semibold hover:underline">
                                <span style="color: #ff681b;">📞 ${branch.phone}</span>
                            </a>
                        </div>
                    `;
                });
                resultArea.innerHTML = htmlContent;
            } else {
                resultArea.innerHTML = `
                    <div class="text-center py-6">
                        <p class="text-gray-500 font-medium text-sm mb-1">해당 지역에 배정된 지정점이 없습니다.</p>
                        <p class="text-gray-400 text-xs">고객센터(1588-4141)로 직접 문의해주세요.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
